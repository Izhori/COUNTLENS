  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"bba14f85-d4b5-42a8-a633-efc69e63da78\"><\u002Fscript>\n<\u002Fhead>\n<body>\n<x-dc>\n<helmet>\n  <script src=\"c1e5f316-adcb-4a87-8cbb-acb317b81bcd\"><\u002Fscript>\n  <script src=\"c9e6d9d9-f8ab-4de0-bc12-34ee03064880\"><\u002Fscript>\n  <style>\n    @keyframes spin { to { transform: rotate(360deg); } }\n    @keyframes barpulse { 0%,100%{ opacity:.35 } 50%{ opacity:1 } }\n    @keyframes pop { 0%{ transform:scale(.5); opacity:0 } 100%{ transform:scale(1); opacity:1 } }\n    @keyframes fadeup { from{ transform:translateY(10px); opacity:0 } to{ transform:translateY(0); opacity:1 } }\n  <\u002Fstyle>\n<\u002Fhelmet>\n<x-import component-from-global-scope=\"IOSDevice\" from=\"68687bae-ccc6-4608-87d1-748d884bd880#/ios-frame.jsx\" dark=\"{{ dark }}\" width=\"402\" height=\"874\" hint-size=\"402px,874px\">{{ app }}<\u002Fx-import>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:&quot;402px&quot;,&quot;height&quot;:&quot;874px&quot;},&quot;dark&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;},&quot;accent&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#34D399&quot;,&quot;options&quot;:[&quot;#34D399&quot;,&quot;#4F46E5&quot;,&quot;#F2994A&quot;,&quot;#2D9CDB&quot;],&quot;tsType&quot;:&quot;string&quot;},&quot;minCount&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:1,&quot;min&quot;:1,&quot;max&quot;:50,&quot;tsType&quot;:&quot;number&quot;}}\">\nclass Component extends DCLogic {\n  state = {\n    screen: 'capture',\n    imgSrc: null,\n    imgAspect: 0.66,\n    items: [],\n    selected: [],\n    prices: {},\n    records: [],\n    addMode: null,\n    place: '',\n    geoNote: '',\n    memo: '',\n    capturedAt: '',\n    error: '',\n    busy: false,\n    threshold: 1,\n    openedName: '',\n    savedNote: '',\n    keyInput: '',\n    showKey: false,\n  };\n\n  palette = ['#5B8DEF','#F2994A','#27AE60','#EB5757','#9B51E0','#2D9CDB','#F2C94C','#EB5FA0','#56CCF2','#6FCF97','#F2785C','#7C5CFF'];\n\n  get variant(){ return this.props.variant || 'single'; }\n  get dark(){ return this.props.dark ?? (this.variant === 'single'); }\n  get accent(){ return this.props.accent || (this.dark ? '#34D399' : '#4F46E5'); }\n\n  theme(){\n    return this.dark\n      ? { bg:'#0B0B0E', panel:'#16161B', card:'#1E1E25', fg:'#F4F4F7', sub:'#9A9AA8', line:'rgba(255,255,255,0.09)', accent:this.accent, accentFg:'#06210F', shadow:'0 8px 30px rgba(0,0,0,0.5)' }\n      : { bg:'#FFFFFF', panel:'#F6F6F8', card:'#FFFFFF', fg:'#0D0D12', sub:'#73737E', line:'rgba(0,0,0,0.08)', accent:this.accent, accentFg:'#FFFFFF', shadow:'0 8px 30px rgba(0,0,0,0.10)' };\n  }\n\n  labels(){ return [...new Set(this.state.items.map(i => i.label))]; }\n  colorFor(label){ const ls = this.labels(); const i = ls.indexOf(label); return this.palette[(i<0?0:i) % this.palette.length]; }\n  countOf(label){ return this.state.items.filter(i => i.label === label).length; }\n  eligibleLabels(){ const th = this.state.threshold || 1; return this.labels().filter(l => this.countOf(l) >= th); }\n  effSelected(){ const th = this.state.threshold || 1; return this.state.selected.filter(l => this.countOf(l) >= th); }\n  selectedTotal(){ const es = this.effSelected(); return this.state.items.filter(i => es.includes(i.label)).length; }\n  unitPrice(label){ const p = this.state.prices[label]; return (p == null || isNaN(p)) ? 0 : Number(p); }\n  lineTotal(label){ return this.unitPrice(label) * this.countOf(label); }\n  grandAmount(){ return this.effSelected().reduce((a, l) => a + this.lineTotal(l), 0); }\n  yen(n){ return '¥' + Number(n || 0).toLocaleString('ja-JP'); }\n\n  nowStr(){ const d=new Date(); const p=n=>String(n).padStart(2,'0'); return `${d.getFullYear()}/${p(d.getMonth()+1)}/${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`; }\n\n  parseJSON(t){\n    let s = String(t).trim();\n    s = s.replace(/```json/gi,'').replace(/```/g,'').trim();\n    const a = s.indexOf('{'), b = s.lastIndexOf('}');\n    if(a>=0 && b>a) s = s.slice(a,b+1);\n    return JSON.parse(s);\n  }\n\n  // 出力JSONが途中で切れていても、完成済みの検出枠を救い出す\n  parseDetection(text){\n    try{\n      const j = this.parseJSON(text);\n      if(j && Array.isArray(j.objects)) return { objects: j.objects, prices: (j.prices && typeof j.prices === 'object') ? j.prices : {} };\n    }catch(_){}\n    const objects = [];\n    const re = /\"label\"\\s*:\\s*\"([^\"]+)\"\\s*,\\s*\"box\"\\s*:\\s*\\[\\s*(-?\\d+(?:\\.\\d+)?)\\s*,\\s*(-?\\d+(?:\\.\\d+)?)\\s*,\\s*(-?\\d+(?:\\.\\d+)?)\\s*,\\s*(-?\\d+(?:\\.\\d+)?)\\s*\\]/g;\n    let m;\n    while((m = re.exec(text))){ objects.push({ label: m[1], box: [Number(m[2]), Number(m[3]), Number(m[4]), Number(m[5])] }); }\n    const prices = {};\n    const pi = text.indexOf('\"prices\"');\n    if(pi >= 0){ const seg = text.slice(pi + 8); const pe = /\"([^\"]+)\"\\s*:\\s*(\\d+)/g; let pm; while((pm = pe.exec(seg))){ prices[pm[1]] = Number(pm[2]); } }\n    return { objects, prices };\n  }\n\n  onFile = (e) => {\n    const f = e.target.files && e.target.files[0];\n    if(!f) return;\n    this.extractGeo(f);\n    const r = new FileReader();\n    r.onload = () => this.loadSrc(r.result);\n    r.readAsDataURL(f);\n    e.target.value = '';\n  };\n\n  async extractGeo(file){\n    this.setState({ place:'', geoNote:'' });\n    try{\n      if(!window.exifr) return;\n      const g = await window.exifr.gps(file);\n      if(!g || g.latitude == null || g.longitude == null) return;\n      const coords = `${g.latitude.toFixed(5)}, ${g.longitude.toFixed(5)}`;\n      this.setState({ place: coords, geoNote:'写真のGPS情報から自動取得（座標）' });\n      try{\n        const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&zoom=18&accept-language=ja&lat=${g.latitude}&lon=${g.longitude}`);\n        if(res.ok){\n          const j = await res.json();\n          if(j && j.display_name) this.setState({ place: j.display_name, geoNote:'写真のGPS情報から自動取得（推定住所）' });\n        }\n      }catch(_){}\n    }catch(_){}\n  }\n\n  fitDataUrl(img){\n    const LIMIT = 245000;\n    const dims = [1400, 1200, 1024, 880, 760, 640, 520];\n    const quals = [0.82, 0.7, 0.6, 0.5, 0.42];\n    let last = null;\n    for(const d of dims){\n      const sc = Math.min(1, d / Math.max(img.width, img.height));\n      const cw = Math.max(1, Math.round(img.width*sc)), ch = Math.max(1, Math.round(img.height*sc));\n      const cv = document.createElement('canvas'); cv.width = cw; cv.height = ch;\n      cv.getContext('2d').drawImage(img, 0, 0, cw, ch);\n      for(const q of quals){\n        const url = cv.toDataURL('image/jpeg', q);\n        const b64len = url.length - url.indexOf(',') - 1;\n        last = { url, w:cw, h:ch };\n        if(b64len <= LIMIT) return last;\n      }\n    }\n    return last;\n  }\n  loadSrc(src){\n    const img = new Image();\n    img.onload = () => { const fit = this.fitDataUrl(img); this._src = fit.url; this.setState({ imgSrc: fit.url, imgAspect: fit.h/fit.w || 0.66 }); this.detect(fit.url); };\n    img.onerror = () => { this.setState({ screen:'capture', error:'画像を読み込めませんでした。別のファイルをお試しください。' }); };\n    img.src = src;\n  }\n\n  drawSample = () => {\n    const c = document.createElement('canvas'); c.width = 960; c.height = 640;\n    const x = c.getContext('2d');\n    const g = x.createLinearGradient(0,0,0,640); g.addColorStop(0,'#ECE5D8'); g.addColorStop(1,'#DED4C2');\n    x.fillStyle = g; x.fillRect(0,0,960,640);\n    x.strokeStyle = 'rgba(120,90,50,0.18)'; x.lineWidth = 14;\n    for(let i=1;i<3;i++){ x.beginPath(); x.moveTo(0,i*213); x.lineTo(960,i*213); x.stroke(); }\n    const fruit = (cx,cy,r,col,dark,leaf) => {\n      const grd = x.createRadialGradient(cx-r*0.35,cy-r*0.35,r*0.2,cx,cy,r);\n      grd.addColorStop(0, col); grd.addColorStop(1, dark);\n      x.fillStyle = grd; x.beginPath(); x.arc(cx,cy,r,0,7); x.fill();\n      x.fillStyle = 'rgba(255,255,255,0.35)'; x.beginPath(); x.ellipse(cx-r*0.35,cy-r*0.4,r*0.22,r*0.13,-0.6,0,7); x.fill();\n      x.strokeStyle = '#6B4A2B'; x.lineWidth = r*0.12; x.beginPath(); x.moveTo(cx,cy-r); x.lineTo(cx+r*0.1,cy-r*1.3); x.stroke();\n      if(leaf){ x.fillStyle = '#4E8A3A'; x.beginPath(); x.ellipse(cx+r*0.35,cy-r*1.15,r*0.32,r*0.16,0.5,0,7); x.fill(); }\n    };\n    const rows = [\n      { col:'#E0463B', dark:'#9E261F', leaf:true, n:7 },\n      { col:'#F0A23A', dark:'#C06A12', leaf:false, n:6 },\n      { col:'#8CBF4B', dark:'#5C8A28', leaf:true, n:5 },\n    ];\n    rows.forEach((row, ri) => {\n      for(let i=0;i<row.n;i++){\n        const cx = 130 + i*125 + (Math.random()*24-12);\n        const cy = 150 + ri*180 + (Math.random()*22-11);\n        fruit(cx, cy, 52, row.col, row.dark, row.leaf);\n      }\n    });\n    this.loadSrc(c.toDataURL('image/jpeg', 0.9));\n  };\n\n  hasBackend(){ return !!(window.claude && window.claude.complete) || !!this.apiKey(); }\n  apiKey(){ try{ return localStorage.getItem('countlens_api_key') || ''; }catch(_){ return ''; } }\n  saveKey = () => { const k = (this.state.keyInput||'').trim(); if(!k) return; try{ localStorage.setItem('countlens_api_key', k); }catch(_){}; this.setState({ keyInput:'' }); if(this._src) this.detect(this._src); else this.setState({ screen:'capture' }); };\n  clearKey = () => { try{ localStorage.removeItem('countlens_api_key'); }catch(_){}; this.forceUpdate(); };\n  async callVision(content){\n    if(window.claude && window.claude.complete){ return await window.claude.complete({ messages:[{ role:'user', content }] }); }\n    const key = this.apiKey();\n    if(!key) throw new Error('NO_BACKEND');\n    let preferred = ''; try{ preferred = localStorage.getItem('countlens_model') || ''; }catch(_){}\n    const candidates = [preferred, 'claude-haiku-4-5', 'claude-sonnet-4-6', 'claude-sonnet-4-5', 'claude-3-5-sonnet-20241022'].filter((m,i,a) => m && a.indexOf(m) === i);\n    let lastErr = '';\n    for(const model of candidates){\n      const res = await fetch('https://api.anthropic.com/v1/messages', {\n        method:'POST',\n        headers:{ 'content-type':'application/json', 'x-api-key':key, 'anthropic-version':'2023-06-01', 'anthropic-dangerous-direct-browser-access':'true' },\n        body: JSON.stringify({ model, max_tokens:1024, messages:[{ role:'user', content }] }),\n      });\n      if(res.ok){ try{ localStorage.setItem('countlens_model', model); }catch(_){}; const j = await res.json(); return (j.content && j.content[0] && j.content[0].text) || ''; }\n      const t = await res.text().catch(()=>'');\n      if(res.status === 401 || res.status === 403){ throw new Error('APIキーが無効か権限がありません（' + res.status + '）'); }\n      if(res.status === 429){ throw new Error('レート制限中です（429）。少し待って再試行してください。'); }\n      if(res.status === 404 || /not_found/i.test(t)){ lastErr = model + ' が使えません'; continue; }\n      throw new Error('API ' + res.status + ' ' + t.slice(0,120));\n    }\n    throw new Error('このキーで使えるモデルが見つかりませんでした（' + lastErr + '）');\n  }\n\n  async detect(src){\n    if(!this.hasBackend()){ this.setState({ screen:'needkey' }); return; }\n    this.setState({ screen:'analyzing', error:'' });\n    try{\n      const media = src.substring(5, src.indexOf(';'));\n      const b64 = src.split(',')[1];\n      const prompt = '画像内の数えられる物体を1つずつ検出してください。出力はJSONのみ、説明や```は不要。形式: {\"objects\":[{\"label\":\"日本語の短い名詞(単数)\",\"box\":[x,y,w,h]}], \"prices\":{\"<label>\":推定単価}}。boxは対象物にぴったり外接する矩形。画像左上を(0,0)、右下を(1000,1000)として、x=矩形の左上角の横位置, y=矩形の左上角の縦位置, w=矩形の幅, h=矩形の高さ（すべて0〜1000の整数）。中心座標や[x1,y1,x2,y2]ではなく必ず[左上x,左上y,幅,高さ]。各矩形は対象物だけを囲み大きすぎないように。見た目が同じ物は同じlabelに統一し、物体ごとに必ず1エントリ作成。最大50個まで。pricesには各labelごとの日本円での推定単価(1個あたり、整数)を入れてください。';\n      const res = await this.callVision([\n        { type:'image', source:{ type:'base64', media_type: media, data: b64 } },\n        { type:'text', text: prompt },\n      ]);\n      const parsed = this.parseDetection(res);\n      let id = 1;\n      const items = parsed.objects\n        .filter(o => Array.isArray(o.box) && o.box.length === 4)\n        .map(o => ({ id: id++, label: String(o.label || '物体').trim() || '物体', box: o.box.map(n => Math.max(0, Math.min(1000, Number(n)||0))) }));\n      const labels = [...new Set(items.map(i => i.label))];\n      const prices = {};\n      Object.keys(parsed.prices || {}).forEach(k => { const v = Number(parsed.prices[k]); if(!isNaN(v)) prices[String(k).trim()] = Math.max(0, Math.round(v)); });\n      this.setState({\n        items,\n        selected: labels,\n        prices,\n        capturedAt: this.nowStr(),\n        screen: this.variant === 'single' ? 'result' : 'review',\n      });\n    }catch(e){\n      this.setState({ error:'検出に失敗しました（' + ((e && e.message) || 'error') + '）。もう一度お試しください。', screen:'capture' });\n    }\n  }\n\n  reset = () => this.setState({ screen:'capture', imgSrc:null, items:[], selected:[], prices:{}, addMode:null, place:'', geoNote:'', memo:'', error:'', savedNote:'' });\n  newSession = () => {\n    if(this.state.records.length && !window.confirm('現在の計測リスト（' + this.state.records.length + '件）をすべて消去して、新しいセッションを開始しますか？')) return;\n    this.fileHandle = null;\n    this.persist([]);\n    this.setState({ records:[], openedName:'', savedNote:'', screen:'capture', imgSrc:null, items:[], selected:[], prices:{}, addMode:null, place:'', geoNote:'', memo:'', error:'' });\n  };\n  setThreshold = (v) => this.setState({ threshold: Math.max(1, Math.min(999, Math.round(v) || 1)) });\n  setPrice = (label, v) => this.setState(s => ({ prices: { ...s.prices, [label]: v === '' ? undefined : Math.max(0, Math.round(Number(v) || 0)) } }));\n\n  storeKey(){ return 'countlens_records_iphone'; }\n  componentDidMount(){ try{ const s = localStorage.getItem(this.storeKey()); if(s){ const r = JSON.parse(s); if(Array.isArray(r)) this.setState({ records: r }); } }catch(_){} if(this.props.minCount != null) this.setState({ threshold: Math.max(1, Math.round(this.props.minCount) || 1) }); }\n  persist(records){ try{ localStorage.setItem(this.storeKey(), JSON.stringify(records)); }catch(_){} }\n\n  recordsCount(){ return this.state.records.reduce((a,r)=>a+r.total,0); }\n  recordsAmount(){ return this.state.records.reduce((a,r)=>a+r.amount,0); }\n\n  addRecord = () => {\n    const sel = this.effSelected().filter(l => this.countOf(l) > 0);\n    if(!sel.length){ this.setState({ error:'リストに追加できる対象がありません。（最小数量の条件もご確認ください）' }); return; }\n    const rows = sel.map(l => ({ label:l, count:this.countOf(l), unit:this.unitPrice(l), amount:this.lineTotal(l), color:this.colorFor(l) }));\n    const rec = { id: Date.now(), capturedAt: this.state.capturedAt, place: this.state.place, memo: this.state.memo,\n      rows, total: rows.reduce((a,r)=>a+r.count,0), amount: rows.reduce((a,r)=>a+r.amount,0) };\n    const records = [...this.state.records, rec];\n    this.persist(records);\n    this.setState({ records, screen:'list', imgSrc:null, items:[], selected:[], prices:{}, addMode:null, place:'', geoNote:'', memo:'', error:'' });\n  };\n  deleteRecord = (id) => { const records = this.state.records.filter(r => r.id !== id); this.persist(records); this.setState({ records }); };\n  clearRecords = () => { this.persist([]); this.setState({ records: [] }); };\n  goList = () => this.setState({ screen:'list', error:'' });\n  goSummary = () => this.setState({ screen:'summary', error:'' });\n  aggregate(){\n    const agg = {};\n    this.state.records.forEach(rec => rec.rows.forEach(row => {\n      if(!agg[row.label]) agg[row.label] = { count:0, amount:0, color: row.color };\n      agg[row.label].count += row.count; agg[row.label].amount += row.amount;\n    }));\n    const labels = Object.keys(agg).sort((a,b) => agg[b].count - agg[a].count);\n    const totC = labels.reduce((x,l) => x + agg[l].count, 0);\n    const totA = labels.reduce((x,l) => x + agg[l].amount, 0);\n    return { agg, labels, totC, totA };\n  }\n  toggleSelect = (label) =
