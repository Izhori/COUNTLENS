<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/exifr@7.1.3/dist/full.umd.js"></script>
  <style>
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes pop { 0%{ transform:scale(.5); opacity:0 } 100%{ transform:scale(1); opacity:1 } }
    @keyframes fadeup { from{ transform:translateY(10px); opacity:0 } to{ transform:translateY(0); opacity:1 } }
    @keyframes scan { 0%{ transform:translateY(-100%) } 100%{ transform:translateY(100%) } }
    html,body{ margin:0; height:100%; }
    input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button{ -webkit-appearance:none; margin:0; }
    input[type=number]{ -moz-appearance:textfield; }
    *::-webkit-scrollbar{ width:11px; height:11px; }
    *::-webkit-scrollbar-thumb{ background:rgba(140,140,160,0.35); border-radius:8px; border:3px solid transparent; background-clip:padding-box; }
    *::-webkit-scrollbar-thumb:hover{ background:rgba(140,140,160,0.55); background-clip:padding-box; }
  </style>
</helmet>
<div style="width:100%; height:100vh; min-height:640px; overflow:hidden;">{{ app }}</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:&quot;1440px&quot;,&quot;height&quot;:&quot;900px&quot;},&quot;theme&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;dark&quot;,&quot;light&quot;],&quot;default&quot;:&quot;dark&quot;,&quot;tsType&quot;:&quot;'dark'|'light'&quot;},&quot;accent&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#34D399&quot;,&quot;options&quot;:[&quot;#34D399&quot;,&quot;#4F46E5&quot;,&quot;#F2994A&quot;,&quot;#2D9CDB&quot;],&quot;tsType&quot;:&quot;string&quot;},&quot;minCount&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:1,&quot;min&quot;:1,&quot;max&quot;:50,&quot;tsType&quot;:&quot;number&quot;}}">
class Component extends DCLogic {
  state = {
    nav: 'measure',
    screen: 'capture',
    imgSrc: null,
    imgAspect: 0.66,
    items: [],
    selected: [],
    prices: {},
    records: [],
    addMode: null,
    place: '',
    geoNote: '',
    memo: '',
    capturedAt: '',
    error: '',
    drag: false,
    cameraError: '',
    devices: [],
    deviceId: null,
    threshold: 1,
  };

  palette = ['#34D399','#5B8DEF','#F2994A','#EB5757','#9B51E0','#F2C94C','#2D9CDB','#EB5FA0','#56CCF2','#F2785C','#7C5CFF','#6FCF97'];
  fileRef = React.createRef();

  get mode(){ return this.props.theme || 'dark'; }
  get accent(){ return this.props.accent || '#34D399'; }

  theme(){
    const a = this.accent;
    return this.mode === 'light'
      ? { mode:'light', bg:'#F4F4F6', side:'#FFFFFF', panel:'#FFFFFF', panel2:'#F1F1F4', fg:'#16161C', sub:'#6B6B78', line:'rgba(0,0,0,0.09)', accent:a, accentFg:'#05210F', shadow:'0 16px 44px rgba(0,0,0,0.10)', dropBg:'#FFFFFF' }
      : { mode:'dark', bg:'#0A0A0D', side:'#0E0E13', panel:'#15151C', panel2:'#1E1E27', fg:'#F2F2F7', sub:'#8A8A98', line:'rgba(255,255,255,0.08)', accent:a, accentFg:'#05210F', shadow:'0 18px 50px rgba(0,0,0,0.55)', dropBg:'#101016' };
  }

  labels(){ return [...new Set(this.state.items.map(i => i.label))]; }
  colorFor(label){ const ls = this.labels(); const i = ls.indexOf(label); return this.palette[(i<0?0:i) % this.palette.length]; }
  countOf(label){ return this.state.items.filter(i => i.label === label).length; }
  eligibleLabels(){ const th = this.state.threshold || 1; return this.labels().filter(l => this.countOf(l) >= th); }
  effSelected(){ const th = this.state.threshold || 1; return this.state.selected.filter(l => this.countOf(l) >= th); }
  selectedTotal(){ const es = this.effSelected(); return this.state.items.filter(i => es.includes(i.label)).length; }
  unitPrice(label){ const p = this.state.prices[label]; return (p == null || isNaN(p)) ? 0 : Number(p); }
  lineTotal(label){ return this.unitPrice(label) * this.countOf(label); }
  grandAmount(){ return this.effSelected().reduce((a, l) => a + this.lineTotal(l), 0); }
  yen(n){ return '¥' + Number(n || 0).toLocaleString('ja-JP'); }
  nowStr(){ const d=new Date(); const p=n=>String(n).padStart(2,'0'); return `${d.getFullYear()}/${p(d.getMonth()+1)}/${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`; }

  parseJSON(t){
    let s = String(t).trim();
    s = s.replace(/```json/gi,'').replace(/```/g,'').trim();
    const a = s.indexOf('{'), b = s.lastIndexOf('}');
    if(a>=0 && b>a) s = s.slice(a,b+1);
    return JSON.parse(s);
  }

  handleFile(file){
    if(!file) return;
    this.extractGeo(file);
    const r = new FileReader();
    r.onload = () => this.loadSrc(r.result);
    r.readAsDataURL(file);
  }
  onFile = (e) => { const f = e.target.files && e.target.files[0]; if(f) this.handleFile(f); e.target.value = ''; };
  pickFile = () => { if(this.fileRef.current) this.fileRef.current.click(); };
  onDrop = (e) => { e.preventDefault(); this.setState({ drag:false }); const f = e.dataTransfer.files && e.dataTransfer.files[0]; if(f && f.type.indexOf('image')===0) this.handleFile(f); };
  onDragOver = (e) => { e.preventDefault(); if(!this.state.drag) this.setState({ drag:true }); };
  onDragLeave = (e) => { e.preventDefault(); this.setState({ drag:false }); };

  setVideo = (el) => { this.videoEl = el; if(el && this.stream){ el.srcObject = this.stream; const p = el.play && el.play(); if(p && p.catch) p.catch(()=>{}); } };
  startCamera = async (deviceId) => {
    const useId = (typeof deviceId === 'string') ? deviceId : null;
    this.setState({ screen:'camera', nav:'measure', cameraError:'', error:'', place:'', geoNote:'' });
    const md = navigator.mediaDevices;
    const inFrame = (window.self !== window.top);
    if(typeof window.isSecureContext !== 'undefined' && !window.isSecureContext){
      this.setState({ cameraError: 'secure:カメラは「https接続」または「localhost」でのみ利用できます。この画面は保護されていない接続のため起動できません。' }); return;
    }
    if(!md || !md.getUserMedia){ this.setState({ cameraError:'env:このブラウザ／環境はカメラ撮影に対応していません。' }); return; }
    try{
      if(this.stream) this.stream.getTracks().forEach(t => t.stop());
      let stream;
      try{ stream = await md.getUserMedia({ audio:false, video: useId ? { deviceId:{ exact:useId } } : { facingMode:'environment', width:{ ideal:1920 }, height:{ ideal:1080 } } }); }
      catch(e1){ stream = await md.getUserMedia({ audio:false, video:true }); }
      this.stream = stream;
      if(this.videoEl){ this.videoEl.srcObject = stream; const p = this.videoEl.play && this.videoEl.play(); if(p && p.catch) p.catch(()=>{}); }
      let devices = [];
      try{ devices = (await md.enumerateDevices()).filter(d => d.kind === 'videoinput'); }catch(_){}
      const track = stream.getVideoTracks()[0];
      const curId = (track && track.getSettings) ? track.getSettings().deviceId : useId;
      this.setState({ devices, deviceId: curId });
    }catch(e){
      const n = (e && e.name) || '';
      let msg;
      if(n === 'NotAllowedError' || n === 'SecurityError'){
        msg = (inFrame ? 'frame:プレビュー枠（iframe）にカメラ権限が無いため起動できません。下のボタンからフルページ版を開いて、アドレスバーのカメラ許可を「許可」にしてください。'
                       : 'denied:カメラの使用がブロックされています。アドレスバーのカメラアイコンから「許可」に変更して再試行してください。');
      } else if(n === 'NotFoundError' || n === 'OverconstrainedError'){ msg = 'notfound:利用可能なカメラが見つかりませんでした。'; }
      else if(n === 'NotReadableError'){ msg = 'busy:カメラが他のアプリで使用中の可能性があります。アプリを閉じて再試行してください。'; }
      else { msg = 'カメラにアクセスできませんでした（' + (n || 'error') + '）。'; }
      this.setState({ cameraError: msg });
    }
  };
  capturePhoto = () => {
    const v = this.videoEl;
    if(!v || !v.videoWidth){ return; }
    const cv = document.createElement('canvas'); cv.width = v.videoWidth; cv.height = v.videoHeight;
    cv.getContext('2d').drawImage(v, 0, 0);
    const url = cv.toDataURL('image/jpeg', 0.92);
    this.stopCamera();
    this.setState({ place:'', geoNote:'' });
    this.loadSrc(url);
  };
  stopCamera = () => { if(this.stream){ this.stream.getTracks().forEach(t => t.stop()); this.stream = null; } };
  closeCamera = () => { this.stopCamera(); this.setState({ screen:'capture', cameraError:'' }); };
  openTop = () => { try{ window.open(window.location.href, '_blank', 'noopener'); }catch(_){ } };
  switchCamera = () => { const ds = this.state.devices; if(ds.length < 2) return; const i = ds.findIndex(d => d.deviceId === this.state.deviceId); this.startCamera(ds[(i+1) % ds.length].deviceId); };
  componentWillUnmount(){ this.stopCamera(); }

  async extractGeo(file){
    this.setState({ place:'', geoNote:'' });
    try{
      if(!window.exifr) return;
      const g = await window.exifr.gps(file);
      if(!g || g.latitude == null || g.longitude == null) return;
      this.setState({ place: `${g.latitude.toFixed(5)}, ${g.longitude.toFixed(5)}`, geoNote:'写真のGPS情報から自動取得（座標）' });
      try{
        const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&zoom=18&accept-language=ja&lat=${g.latitude}&lon=${g.longitude}`);
        if(res.ok){ const j = await res.json(); if(j && j.display_name) this.setState({ place: j.display_name, geoNote:'写真のGPS情報から自動取得（推定住所）' }); }
      }catch(_){}
    }catch(_){}
  }

  // 検出APIのリクエスト上限(約256KB)に収まるよう、解像度と画質を段階的に下げて圧縮
  fitDataUrl(img){
    const LIMIT = 245000; // base64文字数の上限目安
    const dims = [1400, 1200, 1024, 880, 760, 640, 520];
    const quals = [0.82, 0.7, 0.6, 0.5, 0.42];
    let last = null;
    for(const d of dims){
      const sc = Math.min(1, d / Math.max(img.width, img.height));
      const cw = Math.max(1, Math.round(img.width*sc)), ch = Math.max(1, Math.round(img.height*sc));
      const cv = document.createElement('canvas'); cv.width = cw; cv.height = ch;
      cv.getContext('2d').drawImage(img, 0, 0, cw, ch);
      for(const q of quals){
        const url = cv.toDataURL('image/jpeg', q);
        const b64len = url.length - url.indexOf(',') - 1;
        last = { url, w:cw, h:ch };
        if(b64len <= LIMIT) return last;
      }
    }
    return last;
  }
  loadSrc(src){
    const img = new Image();
    img.onload = () => {
      const fit = this.fitDataUrl(img);
      this._src = fit.url;
      this.setState({ imgSrc: fit.url, imgAspect: fit.h/fit.w || 0.66, nav:'measure' });
      this.detect(fit.url);
    };
    img.onerror = () => { this.setState({ screen:'capture', error:'画像を読み込めませんでした。別のファイルをお試しください。' }); };
    img.src = src;
  }
  retryDetect = () => { if(this._src) this.detect(this._src); else this.reset(); };

  drawSample = () => {
    const c = document.createElement('canvas'); c.width = 960; c.height = 640;
    const x = c.getContext('2d');
    const g = x.createLinearGradient(0,0,0,640); g.addColorStop(0,'#ECE5D8'); g.addColorStop(1,'#DED4C2');
    x.fillStyle = g; x.fillRect(0,0,960,640);
    x.strokeStyle = 'rgba(120,90,50,0.18)'; x.lineWidth = 14;
    for(let i=1;i<3;i++){ x.beginPath(); x.moveTo(0,i*213); x.lineTo(960,i*213); x.stroke(); }
    const fruit = (cx,cy,r,col,dk,leaf) => {
      const grd = x.createRadialGradient(cx-r*0.35,cy-r*0.35,r*0.2,cx,cy,r);
      grd.addColorStop(0, col); grd.addColorStop(1, dk);
      x.fillStyle = grd; x.beginPath(); x.arc(cx,cy,r,0,7); x.fill();
      x.fillStyle = 'rgba(255,255,255,0.35)'; x.beginPath(); x.ellipse(cx-r*0.35,cy-r*0.4,r*0.22,r*0.13,-0.6,0,7); x.fill();
      x.strokeStyle = '#6B4A2B'; x.lineWidth = r*0.12; x.beginPath(); x.moveTo(cx,cy-r); x.lineTo(cx+r*0.1,cy-r*1.3); x.stroke();
      if(leaf){ x.fillStyle = '#4E8A3A'; x.beginPath(); x.ellipse(cx+r*0.35,cy-r*1.15,r*0.32,r*0.16,0.5,0,7); x.fill(); }
    };
    const rows = [ {col:'#E0463B',dk:'#9E261F',leaf:true,n:7}, {col:'#F0A23A',dk:'#C06A12',leaf:false,n:6}, {col:'#8CBF4B',dk:'#5C8A28',leaf:true,n:5} ];
    rows.forEach((row, ri) => { for(let i=0;i<row.n;i++){ fruit(130+i*125+(Math.random()*24-12), 150+ri*180+(Math.random()*22-11), 52, row.col, row.dk, row.leaf); } });
    this.handleFile(null);
    this.setState({ place:'', geoNote:'' });
    this.loadSrc(c.toDataURL('image/jpeg', 0.9));
  };

  async detect(src){
    this.setState({ screen:'analyzing', nav:'measure', error:'' });
    try{
      const media = src.substring(5, src.indexOf(';'));
      const b64 = src.split(',')[1];
      const prompt = '画像内の数えられる物体を1つずつ検出してください。出力はJSONのみ、説明や```は不要。形式: {"objects":[{"label":"日本語の短い名詞(単数)","box":[x,y,w,h]}], "prices":{"<label>":推定単価}}。座標は画像全体を0〜1000に正規化した整数で、boxは[左上x, 左上y, 幅, 高さ]。見た目が同じ物は同じlabelに統一し、物体ごとに必ず1エントリ作成。最大50個まで。pricesには各labelごとの日本円での推定単価(1個あたり、整数)を入れてください。';
      const res = await window.claude.complete({ messages:[{ role:'user', content:[
        { type:'image', source:{ type:'base64', media_type: media, data: b64 } },
        { type:'text', text: prompt },
      ]}]});
      const parsed = this.parseDetection(res);
      let id = 1;
      const items = parsed.objects.filter(o => Array.isArray(o.box) && o.box.length === 4)
        .map(o => ({ id: id++, label: String(o.label || '物体').trim() || '物体', box: o.box.map(n => Math.max(0, Math.min(1000, Number(n)||0))) }));
      const labels = [...new Set(items.map(i => i.label))];
      const prices = {};
      Object.keys(parsed.prices || {}).forEach(k => { const v = Number(parsed.prices[k]); if(!isNaN(v)) prices[String(k).trim()] = Math.max(0, Math.round(v)); });
      this.setState({ items, selected: labels, prices, capturedAt: this.nowStr(), screen:'result' });
    }catch(e){
      this.setState({ error:'検出に失敗しました（' + ((e && e.message) || 'error') + '）。通信状況を確認して再試行してください。', screen:'failed' });
    }
  }

  // 厳密なJSONが壊れていても（トークン上限での途中切れ等）、完成済みの検出枠を救い出す
  parseDetection(text){
    try{
      const j = this.parseJSON(text);
      if(j && Array.isArray(j.objects)) return { objects: j.objects, prices: (j.prices && typeof j.prices === 'object') ? j.prices : {} };
    }catch(_){}
    const objects = [];
    const re = /"label"\s*:\s*"([^"]+)"\s*,\s*"box"\s*:\s*\[\s*(-?\d+(?:\.\d+)?)\s*,\s*(-?\d+(?:\.\d+)?)\s*,\s*(-?\d+(?:\.\d+)?)\s*,\s*(-?\d+(?:\.\d+)?)\s*\]/g;
    let m;
    while((m = re.exec(text))){ objects.push({ label: m[1], box: [Number(m[2]), Number(m[3]), Number(m[4]), Number(m[5])] }); }
    const prices = {};
    const pi = text.indexOf('"prices"');
    if(pi >= 0){ const seg = text.slice(pi + 8); const pe = /"([^"]+)"\s*:\s*(\d+)/g; let pm; while((pm = pe.exec(seg))){ prices[pm[1]] = Number(pm[2]); } }
    return { objects, prices };
  }

  reset = () => { this.stopCamera(); this.setState({ nav:'measure', screen:'capture', imgSrc:null, items:[], selected:[], prices:{}, addMode:null, place:'', geoNote:'', memo:'', error:'', cameraError:'' }); };
  newSession = () => {
    if(this.state.records.length && !window.confirm('現在の計測リスト（' + this.state.records.length + '件）をすべて消去して、新しいセッションを開始しますか？')) return;
    this.stopCamera();
    this.persist([]);
    this.setState({ records:[], nav:'measure', screen:'capture', imgSrc:null, items:[], selected:[], prices:{}, addMode:null, place:'', geoNote:'', memo:'', error:'', cameraError:'' });
  };
  setPrice = (label, v) => this.setState(s => ({ prices: { ...s.prices, [label]: v === '' ? undefined : Math.max(0, Math.round(Number(v) || 0)) } }));
  setThreshold = (v) => this.setState({ threshold: Math.max(1, Math.min(999, Math.round(v) || 1)) });
  toggleSelect = (label) => this.setState(s => ({ selected: s.selected.includes(label) ? s.selected.filter(l=>l!==label) : [...s.selected, label] }));
  setAddMode = (label) => this.setState(s => ({ addMode: s.addMode === label ? null : label }));
  deleteItem = (id) => this.setState(s => ({ items: s.items.filter(i => i.id !== id) }));
  addAt = (e) => {
    if(!this.state.addMode) return;
    const r = e.currentTarget.getBoundingClientRect();
    const fx = (e.clientX - r.left) / r.width, fy = (e.clientY - r.top) / r.height;
    const w = 80, h = 80;
    const box = [ Math.max(0,Math.min(1000-w, fx*1000 - w/2)), Math.max(0,Math.min(1000-h, fy*1000 - h/2)), w, h ];
    const id = (Math.max(0, ...this.state.items.map(i=>i.id)) + 1);
    this.setState(s => ({ items:[...s.items, { id, label: s.addMode, box, manual:true }] }));
  };

  storeKey(){ return 'countlens_records_pc'; }
  componentDidMount(){ try{ const s = localStorage.getItem(this.storeKey()); if(s){ const r = JSON.parse(s); if(Array.isArray(r)) this.setState({ records: r }); } }catch(_){} if(this.props.minCount != null) this.setState({ threshold: Math.max(1, Math.round(this.props.minCount) || 1) }); }
  persist(records){ try{ localStorage.setItem(this.storeKey(), JSON.stringify(records)); }catch(_){} }
  recordsCount(){ return this.state.records.reduce((a,r)=>a+r.total,0); }
  recordsAmount(){ return this.state.records.reduce((a,r)=>a+r.amount,0); }

  addRecord = () => {
    const sel = this.effSelected().filter(l => this.countOf(l) > 0);
    if(!sel.length){ this.setState({ error:'リストに追加できる対象がありません。（最小数量の条件もご確認ください）' }); return; }
    const rows = sel.map(l => ({ label:l, count:this.countOf(l), unit:this.unitPrice(l), amount:this.lineTotal(l), color:this.colorFor(l) }));
    const rec = { id: Date.now(), capturedAt: this.state.capturedAt, place: this.state.place, memo: this.state.memo, rows, total: rows.reduce((a,r)=>a+r.count,0), amount: rows.reduce((a,r)=>a+r.amount,0) };
    const records = [...this.state.records, rec];
    this.persist(records);
    this.setState({ records, nav:'records', screen:'capture', imgSrc:null, items:[], selected:[], prices:{}, addMode:null, place:'', geoNote:'', memo:'', error:'' });
  };
  deleteRecord = (id) => { const records = this.state.records.filter(r => r.id !== id); this.persist(records); this.setState({ records }); };
  clearRecords = () => { this.persist([]); this.setState({ records: [] }); };
  goNav = (nav) => { if(nav !== 'measure') this.stopCamera(); this.setState({ nav, error:'' }); };
  aggregate(){
    const agg = {};
    this.state.records.forEach(rec => rec.rows.forEach(row => { if(!agg[row.label]) agg[row.label] = { count:0, amount:0, color: row.color }; agg[row.label].count += row.count; agg[row.label].amount += row.amount; }));
    const labels = Object.keys(agg).sort((a,b) => agg[b].count - agg[a].count);
    return { agg, labels, totC: labels.reduce((x,l)=>x+agg[l].count,0), totA: labels.reduce((x,l)=>x+agg[l].amount,0) };
  }

  saveExcel = () => {
    if(!window.XLSX){ this.setState({ error:'Excelライブラリの読込中です。数秒後に再度お試しください。' }); return; }
    const recs = this.state.records;
    if(!recs.length){ this.setState({ error:'保存する計測結果がありません。先にリストへ追加してください。' }); return; }
    const X = window.XLSX;
    const thin = { style:'thin', color:{ rgb:'D6D5E3' } };
    const med  = { style:'medium', color:{ rgb:'8E8BD6' } };
    const bAll = (b) => ({ top:b, bottom:b, left:b, right:b });
    const headers = ['No', '対象物名', '数量', '単価(円)', '金額(円)', '撮影日時', '場所', 'メモ'];
    const aoa = [ ['CountLens ・ 物体数量計測レポート'], [`作成日時 ${this.nowStr()}　／　記録件数 ${recs.length} 件`], headers ];
    const merges = [ {s:{r:0,c:0},e:{r:0,c:7}}, {s:{r:1,c:0},e:{r:1,c:7}} ];
    const rowShade = {}; let r = 3;
    recs.forEach((rec, i) => {
      const start = r;
      rec.rows.forEach((row, j) => { aoa.push([ j===0?i+1:'', row.label, row.count, row.unit, row.amount, j===0?rec.capturedAt:'', j===0?(rec.place||''):'', j===0?(rec.memo||''):'' ]); rowShade[r]=i%2; r++; });

    const total = this.selectedTotal();
    const addLabels = this.state.selected.length ? this.state.selected : ['対象物'];
    const statCard = (label, value, accent) => h('div',{ style:{ flex:1, padding:'15px 17px', borderRadius:15, background: accent?c.accent:c.panel, color: accent?c.accentFg:c.fg, boxShadow: accent?c.shadow:`inset 0 0 0 1px ${c.line}` } }, [
      h('div',{ key:'l', style:{ fontSize:12.5, fontWeight:650, opacity: accent?0.85:1, color: accent?c.accentFg:c.sub } }, label),
      h('div',{ key:'v', style:{ fontSize:26, fontWeight:800, marginTop:3, fontVariantNumeric:'tabular-nums', letterSpacing:'-0.01em' } }, value),
    ]);
    const field = (label, node) => h('div',{ key:label, style:{ marginBottom:12 } }, [ h('div',{ key:'l', style:{ fontSize:12, fontWeight:650, color:c.sub, marginBottom:6, display:'flex', alignItems:'center', gap:7 } }, label), node ]);
    const inputStyle = { width:'100%', boxSizing:'border-box', fontFamily:'inherit', background:c.panel2, color:c.fg, border:'none', boxShadow:`inset 0 0 0 1px ${c.line}`, borderRadius:11, padding:'11px 13px', fontSize:14 };
    return h('div',{ style:{ display:'flex', gap:24, padding:'24px 28px', alignItems:'flex-start' } }, [
      // left: photo + edit
      h('div',{ key:'left', style:{ flex:'1.5', minWidth:0 } }, [
        this.renderPhoto(c, true),
        h('div',{ key:'edit', style:{ marginTop:16, padding:'14px 16px', borderRadius:14, background:c.panel, boxShadow:`inset 0 0 0 1px ${c.line}` } }, [
          h('div',{ key:'hint', style:{ fontSize:12.5, color:c.sub, marginBottom:10 } }, this.state.addMode ? `「${this.state.addMode}」を写真上でクリックして追加 ・ ボックスのクリックで削除` : '検出ボックスをクリックで削除。手動追加するには対象を選択してください:'),
          h('div',{ key:'chips', style:{ display:'flex', gap:8, flexWrap:'wrap' } }, addLabels.map(l => {
            const on = this.state.addMode === l;
            return h('button',{ key:l, onClick:()=>this.setAddMode(l), style:{ border:'none', cursor:'pointer', padding:'7px 13px', borderRadius:999, fontSize:13, fontWeight:650, background: on?c.accent:c.panel2, color: on?c.accentFg:c.fg, boxShadow:`inset 0 0 0 1px ${c.line}` } }, '＋ '+l);
          })),
        ]),
      ]),
      // right: panel
      h('div',{ key:'right', style:{ width:392, flexShrink:0, display:'flex', flexDirection:'column', gap:16 } }, [
        h('div',{ key:'stats', style:{ display:'flex', gap:12 } }, [ statCard('合計数量', total+' 個', false), statCard('推定総額', this.yen(this.grandAmount()), true) ]),
        h('div',{ key:'bd' }, [
          h('div',{ key:'h', style:{ display:'flex', alignItems:'center', justifyContent:'space-between', gap:10, marginBottom:10 } }, [
            h('div',{ key:'t', style:{ fontSize:12.5, fontWeight:700, color:c.sub, letterSpacing:'0.04em' } }, '対象を選択 / 内訳'),
            h('div',{ key:'th', style:{ display:'flex', alignItems:'center', gap:7 } }, [
              h('span',{ key:'l', style:{ fontSize:11.5, color:c.sub, fontWeight:600 } }, '最小数量'),
              h('div',{ key:'s', style:{ display:'flex', alignItems:'center', background:c.panel2, borderRadius:9, boxShadow:`inset 0 0 0 1px ${c.line}`, overflow:'hidden' } }, [
                h('button',{ key:'m', onClick:()=>this.setThreshold(this.state.threshold-1), style:{ border:'none', background:'transparent', color:c.fg, fontSize:16, fontWeight:700, width:26, height:28, cursor:'pointer', lineHeight:1 } }, '−'),
                h('span',{ key:'v', style:{ minWidth:22, textAlign:'center', fontSize:14, fontWeight:740, color:c.fg, fontVariantNumeric:'tabular-nums' } }, this.state.threshold),
                h('button',{ key:'p', onClick:()=>this.setThreshold(this.state.threshold+1), style:{ border:'none', background:'transparent', color:c.fg, fontSize:16, fontWeight:700, width:26, height:28, cursor:'pointer', lineHeight:1 } }, '＋'),
              ]),
              h('span',{ key:'u', style:{ fontSize:11.5, color:c.sub } }, '個以上'),
            ]),
          ]),
          h('div',{ key:'rows' }, this.eligibleLabels().map(l => this.typeRow(c, l))),
          (this.labels().length>0 && this.eligibleLabels().length===0) ? h('div',{ key:'no', style:{ color:c.sub, fontSize:13, padding:'8px 2px' } }, '最小数量の条件を満たす対象がありません。値を下げてください。') : null,
          this.labels().length===0 ? h('div',{ key:'ne', style:{ color:c.sub, fontSize:13.5, padding:'8px 2px' } }, '対象が検出されませんでした。下のボタンから手動で追加できます。') : null,
          (this.labels().length - this.eligibleLabels().length) > 0 ? h('div',{ key:'hid', style:{ color:c.sub, fontSize:11.5, padding:'6px 2px 0', opacity:0.85 } }, `${this.labels().length - this.eligibleLabels().length}種類が最小数量(${this.state.threshold}個)未満のため非表示`) : null,
        ]),
        h('div',{ key:'meta' }, [
          h('div',{ key:'h', style:{ fontSize:12.5, fontWeight:700, color:c.sub, letterSpacing:'0.04em', marginBottom:10 } }, '記録情報'),
          field('撮影日時', h('div',{ style:{ ...inputStyle, color:c.sub } }, this.state.capturedAt)),
          h('div',{ key:'place', style:{ marginBottom:12 } }, [
            h('div',{ key:'l', style:{ fontSize:12, fontWeight:650, color:c.sub, marginBottom:6, display:'flex', alignItems:'center', gap:7 } }, [ '場所', this.state.geoNote ? h('span',{ key:'b', style:{ fontSize:10.5, fontWeight:700, color:c.accent, background:c.accent+'1f', padding:'2px 7px', borderRadius:6 } }, '📍 自動取得') : null ]),
            h('input',{ key:'i', value:this.state.place, placeholder:'例: 第2倉庫 A-3棚', onChange:e=>this.setState({place:e.target.value}), style:inputStyle }),
            this.state.geoNote ? h('div',{ key:'n', style:{ fontSize:11.5, color:c.sub, marginTop:5 } }, this.state.geoNote) : null,
          ]),
          field('メモ', h('textarea',{ value:this.state.memo, rows:2, placeholder:'気づいた点など', onChange:e=>this.setState({memo:e.target.value}), style:{ ...inputStyle, resize:'none' } })),
        ]),
        this.state.error ? h('div',{ key:'e', style:{ background:'rgba(235,87,87,0.12)', color:'#EB5757', padding:'11px 13px', borderRadius:11, fontSize:13 } }, this.state.error) : null,
        h('div',{ key:'act', style:{ display:'flex', flexDirection:'column', gap:9 } }, [
          h('button',{ key:'add', onClick:this.addRecord, style:{ width:'100%', padding:'15px', borderRadius:14, border:'none', cursor:'pointer', background:c.accent, color:c.accentFg, fontSize:15.5, fontWeight:750, display:'flex', alignItems:'center', justifyContent:'center', gap:8, boxShadow:c.shadow } }, [ h('span',{key:'i',style:{fontSize:18}},'＋'), 'この結果を計測リストに追加' ]),
          h('button',{ key:'rs', onClick:this.reset, style:{ width:'100%', padding:'11px', borderRadius:12, border:'none', cursor:'pointer', background:'transparent', color:c.sub, fontSize:13.5, fontWeight:650 } }, 'やり直す'),
        ]),
      ]),
    ]);
  }

  renderRecords(c){
    const h = React.createElement;
    const recs = this.state.records;
    if(!recs.length) return h('div',{ style:{ padding:'60px 28px', display:'flex', justifyContent:'center' } },
      h('div',{ style:{ maxWidth:520, textAlign:'center', padding:'56px 40px', borderRadius:22, background:c.panel, boxShadow:`inset 0 0 0 1px ${c.line}`, color:c.sub } }, [
        h('div',{ key:'i', style:{ fontSize:40, marginBottom:14 } }, '▤'),
        h('div',{ key:'t', style:{ fontSize:16, fontWeight:700, color:c.fg, marginBottom:8 } }, '計測リストは空です'),
        h('div',{ key:'s', style:{ fontSize:14, lineHeight:1.6, marginBottom:24 } }, '写真を計測して「計測リストに追加」すると、ここに記録がたまります。複数の記録は1つのExcelにまとめて出力できます。'),
        this.btn(c, [ h('span',{key:'i'},'＋'), '写真を計測する' ], this.reset, 'primary'),
      ]));
    return h('div',{ style:{ padding:'24px 28px' } }, [
      h('div',{ key:'bar', style:{ display:'flex', gap:14, marginBottom:20 } }, [
        h('div',{ key:'tot', style:{ flex:1, padding:'18px 22px', borderRadius:18, background:c.accent, color:c.accentFg, display:'flex', alignItems:'stretch', gap:24, boxShadow:c.shadow } }, [
          h('div',{ key:'q' }, [ h('div',{ key:'l', style:{ fontSize:13, fontWeight:650, opacity:0.85 } }, '総数量'), h('div',{ key:'v', style:{ fontSize:30, fontWeight:800, fontVariantNumeric:'tabular-nums', marginTop:2 } }, [ this.recordsCount(), h('span',{key:'u',style:{fontSize:15,marginLeft:3}},'個') ]) ]),
          h('div',{ key:'d', style:{ width:1, background:c.accentFg, opacity:0.25 } }),
          h('div',{ key:'a' }, [ h('div',{ key:'l', style:{ fontSize:13, fontWeight:650, opacity:0.85 } }, '推定総額'), h('div',{ key:'v', style:{ fontSize:30, fontWeight:800, fontVariantNumeric:'tabular-nums', marginTop:2 } }, this.yen(this.recordsAmount())) ]),
          h('div',{ key:'sp', style:{ flex:1 } }),
          h('div',{ key:'c', style:{ alignSelf:'center', fontSize:13, fontWeight:650, opacity:0.85 } }, `${recs.length} 件の記録`),
        ]),
      ]),
      h('div',{ key:'grid', style:{ display:'grid', gridTemplateColumns:'repeat(auto-fill, minmax(286px, 1fr))', gap:14 } }, recs.map((r,i) => this.recordCard(c, r, i))),
    ]);
  }

  recordCard(c, r, i){
    const h = React.createElement;
    return h('div',{ key:r.id, style:{ background:c.panel, borderRadius:16, boxShadow:`inset 0 0 0 1px ${c.line}`, padding:'15px 16px', animation:'fadeup .3s ease both' } }, [
      h('div',{ key:'top', style:{ display:'flex', alignItems:'center', gap:9, marginBottom: r.place?7:11 } }, [
        h('span',{ key:'no', style:{ fontSize:11.5, fontWeight:800, color:c.accent, background:c.accent+'1f', padding:'3px 8px', borderRadius:7 } }, '#'+(i+1)),
        h('span',{ key:'dt', style:{ flex:1, fontSize:12.5, color:c.sub, fontWeight:600 } }, r.capturedAt),
        h('button',{ key:'x', onClick:()=>this.deleteRecord(r.id), title:'削除', style:{ border:'none', background:'transparent', color:c.sub, fontSize:18, lineHeight:1, cursor:'pointer', padding:'2px 5px' } }, '×'),
      ]),
      r.place ? h('div',{ key:'pl', style:{ fontSize:12.5, color:c.sub, marginBottom:11, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' } }, '📍 '+r.place) : null,
      h('div',{ key:'chips', style:{ display:'flex', flexWrap:'wrap', gap:7, marginBottom:12 } }, r.rows.map(row =>
        h('span',{ key:row.label, style:{ display:'inline-flex', alignItems:'center', gap:6, fontSize:12.5, fontWeight:600, color:c.fg, background:c.panel2, borderRadius:8, padding:'5px 9px' } }, [
          h('span',{ key:'d', style:{ width:9, height:9, borderRadius:3, background:row.color } }), h('span',{ key:'t' }, row.label), h('span',{ key:'n', style:{ fontWeight:760 } }, row.count),
        ]))),
      h('div',{ key:'sum', style:{ display:'flex', alignItems:'baseline', justifyContent:'space-between', borderTop:`1px solid ${c.line}`, paddingTop:11 } }, [
        h('span',{ key:'q', style:{ fontSize:13, color:c.sub, fontWeight:600 } }, r.total+'個'),
        h('span',{ key:'a', style:{ fontSize:17, fontWeight:760, color:c.fg, fontVariantNumeric:'tabular-nums' } }, this.yen(r.amount)),
      ]),
    ]);
  }

  renderSummary(c){
    const h = React.createElement;
    const { agg, labels, totC, totA } = this.aggregate();
    if(!labels.length) return h('div',{ style:{ padding:'60px 28px', display:'flex', justifyContent:'center' } },
      h('div',{ style:{ maxWidth:520, textAlign:'center', padding:'56px 40px', borderRadius:22, background:c.panel, boxShadow:`inset 0 0 0 1px ${c.line}`, color:c.sub, fontSize:14.5, lineHeight:1.6 } }, '計測結果をリストに追加すると、対象物ごとの集計をここで確認できます。'));
    const num = (txt, w, o) => h('div',{ style:{ width:w, textAlign:'right', fontSize:(o&&o.sz)||13.5, fontWeight:(o&&o.bold)?760:600, color:(o&&o.color)||c.fg, fontVariantNumeric:'tabular-nums', flexShrink:0 } }, txt);
    return h('div',{ style:{ padding:'24px 28px', maxWidth:780 } }, [
      h('div',{ key:'card', style:{ borderRadius:18, overflow:'hidden', boxShadow:`inset 0 0 0 1px ${c.line}` } }, [
        h('div',{ key:'th', style:{ display:'flex', alignItems:'center', gap:10, padding:'14px 18px', background:c.accent, color:c.accentFg } }, [
          h('div',{ key:'l', style:{ flex:1, fontSize:13, fontWeight:750 } }, '対象物'),
          num('数量', 70, { bold:true, color:c.accentFg }), num('平均単価', 110, { bold:true, color:c.accentFg }), num('金額', 130, { bold:true, color:c.accentFg }),
        ]),
        ...labels.map((l,i) => h('div',{ key:l, style:{ display:'flex', alignItems:'center', gap:10, padding:'14px 18px', background: i%2?c.panel2:c.panel, borderTop:`1px solid ${c.line}` } }, [
          h('div',{ key:'lab', style:{ flex:1, display:'flex', alignItems:'center', gap:10, minWidth:0 } }, [ h('span',{ key:'d', style:{ width:12, height:12, borderRadius:4, background:agg[l].color||c.accent, flexShrink:0 } }), h('span',{ key:'t', style:{ fontSize:15, fontWeight:650, color:c.fg, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' } }, l) ]),
          num(agg[l].count, 70, { bold:true, sz:16 }), num(this.yen(agg[l].count?Math.round(agg[l].amount/agg[l].count):0), 110, { color:c.sub }), num(this.yen(agg[l].amount), 130, { bold:true, sz:15 }),
        ])),
        h('div',{ key:'tr', style:{ display:'flex', alignItems:'center', gap:10, padding:'16px 18px', background:c.accent+'14', borderTop:`2px solid ${c.accent}` } }, [
          h('div',{ key:'l', style:{ flex:1, fontSize:15, fontWeight:780, color:c.fg } }, '合計'),
          num(totC, 70, { bold:true, sz:16 }), num('', 110, {}), num(this.yen(totA), 130, { bold:true, sz:16, color:c.accent }),
        ]),
      ]),
    ]);
  }

  renderApp(){
    const c = this.theme();
    const h = React.createElement;
    let title, sub, actions, content;
    const nav = this.state.nav;
    if(nav === 'records'){
      title = '計測リスト'; sub = this.state.records.length ? `${this.state.records.length} 件の記録` : '記録なし';
      actions = this.state.records.length ? [ this.btn(c, [h('span',{key:'i'},'∑'),'集計を確認'], ()=>this.goNav('summary'), 'outline'), this.btn(c, [h('span',{key:'i'},'⤓'),'まとめてExcel保存'], this.saveExcel, 'primary') ] : [ this.btn(c, [h('span',{key:'i'},'＋'),'写真を計測'], this.reset, 'primary') ];
      content = this.renderRecords(c);
    } else if(nav === 'summary'){
      const ag = this.aggregate();
      title = '対象物別集計'; sub = ag.labels.length ? `${ag.labels.length} 種類 ・ ${this.state.records.length} 件の記録から集計` : '記録なし';
      actions = ag.labels.length ? [ this.btn(c, [h('span',{key:'i'},'⤓'),'Excel保存'], this.saveExcel, 'primary') ] : [];
      content = this.renderSummary(c);
    } else {
      const s = this.state.screen;
      if(s === 'result'){ title = '計測結果'; sub = this.state.capturedAt; actions = [ this.btn(c, 'やり直す', this.reset, 'ghost') ]; content = this.renderResult(c); }
      else if(s === 'analyzing'){ title = '検出中'; sub = 'AI解析'; actions = []; content = this.renderAnalyzing(c); }
      else if(s === 'failed'){ title = '検出に失敗'; sub = ''; actions = [ this.btn(c, 'やり直す', this.reset, 'ghost') ]; content = this.renderFailed(c); }
      else if(s === 'camera'){ title = 'カメラで撮影'; sub = 'シャッターで撮影して検出'; actions = [ this.btn(c, '閉じる', this.closeCamera, 'ghost') ]; content = this.renderCamera(c); }
      else { title = '新規計測'; sub = '写真を読み込んで対象物を検出'; actions = []; content = this.renderCapture(c); }
    }
    return h('div',{ style:{ display:'flex', height:'100%', background:c.bg, color:c.fg, fontFamily:'-apple-system, "Hiragino Sans", system-ui, sans-serif', WebkitFontSmoothing:'antialiased' } }, [
      this.renderSidebar(c),
      this.shell(c, title, sub, actions, content),
      h('input',{ key:'file', ref:this.fileRef, type:'file', accept:'image/*', onChange:this.onFile, style:{ display:'none' } }),
    ]);
  }

  renderVals(){ return { app: this.renderApp() }; }
}
</script>
</body>
</html>
